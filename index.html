<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BCC STOREEE</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-white text-black">

  <!-- NAVBAR -->
  <header class="flex justify-between items-center px-8 py-4 border-b">
    
    <img src="./img/bcclogo.png" alt="Brand Logo" class="h-12"/>
    <nav class="space-x-6 text-sm">
      <a href="https://www.instagram.com/monnndays/">Shop</a>
      <a href="https://www.instagram.com/monnndays/">About</a>
      <a href="https://www.instagram.com/monnndays/">Contact</a>
    </nav>
  </header>

  <!-- HERO -->
  <section class="relative h-[80vh] flex items-center justify-center text-white">
    <img src="./img/monsleep.png"
         class="absolute inset-0 w-full h-full object-cover" />
    
    <div class="relative text-center">
      <h2 class="text-5xl md:text-6xl font-bold mb-4">
        BCC COLLECTION
      </h2>
      <p class="mb-6 text-lg">สร้างโดยจิฐวิตญาณ เละ เงิน</p>
      <a href="https://www.instagram.com/monnndays/" class="px-6 py-3 bg-white text-black font-semibold inline-block">
        SHOP NOW
      </a>
    </div>
  </section>

  <!-- PRODUCT GRID -->
  <section class="px-8 py-16">
    <h3 class="text-2xl font-bold mb-8">Featured</h3>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

      <!-- ITEM -->
      <div class="group">
        <img src="./img/sean.jpg"
             class="w-full h-[400px] object-cover"/>
        <h4 class="mt-4 font-semibold">เสื้อผ้ามังสา</h4>
        <p class="text-gray-500">$99999999999999999</p>
      </div>

      <div class="group">
        <img src="./img/PIE.jpg"
             class="w-full h-[400px] object-cover"/>
        <h4 class="mt-4 font-semibold">แว่นตาทำมัง</h4>
        <p class="text-gray-500">$99999999999999</p>
      </div>

      <div class="group">
        <img src="./img/tor.jpg"
             class="w-full h-[400px] object-cover"/>
        <h4 class="mt-4 font-semibold">เณรไหว้ผี</h4>
        <p class="text-gray-500">$99999999999999999999</p>
      </div>

    </div>
  </section>

  <!-- BRAND STORY -->
  <section class="bg-gray-100 py-20 px-8 text-center">
    <h3 class="text-3xl font-bold mb-4">Our Story</h3>
    <p class="max-w-xl mx-auto text-gray-600">
      BCC Neverdie ต่อ torshino 
    </p>
  </section>

  <!-- CTA -->
  <section class="py-20 text-center">
    <h3 class="text-3xl font-bold mb-4">Join the community</h3>
    <input type="email" placeholder="Enter your email"
      class="border px-4 py-2 w-64"/>
    <button class="ml-2 px-6 py-2 bg-black text-white">
      Subscribe
    </button>
  </section>

  <!-- FOOTER -->
  <footer class="border-t px-8 py-6 text-sm flex justify-between">
    <p>© 2077 BCC</p>
    <div class="space-x-4">
      <a href="https://www.instagram.com/monnndays/">Instagram</a>
      <a href="https://www.instagram.com/monnndays/">Twitter</a>
    </div>
  </footer>

</body>
</html>
